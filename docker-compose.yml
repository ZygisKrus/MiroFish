services:
  mirofish:
    platform: linux/amd64
    build: .
    image: mirofish:local
    container_name: mirofish
    tty: true
    stdin_open: true
    env_file:
      - .env
    ports:
      - "3001:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/logs:/app/backend/logs
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - common_net

networks:
  common_net:
