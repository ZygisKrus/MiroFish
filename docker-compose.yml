services:
  mirofish:
    platform: linux/amd64
    build: .
    image: mirofish:local
    container_name: mirofish
    tty: true
    stdin_open: true
    env_file:
      - .env
    ports:
      - "3001:3000"
      - "5001:5001"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/logs:/app/backend/logs
    deploy:
      resources:
        limits:
          memory: 8G
    networks:
      - common_net

networks:
  common_net:
