services:
  # ─── Main Application ────────────────────────────────────────────────────────
  mirofish:
    # Flask API (:5001) + Vue frontend (:3000) served via `serve`
    platform: linux/amd64
    build: .
    image: mirofish:local
    container_name: mirofish
    tty: true
    stdin_open: true
    env_file:
      - .env
    ports:
      - "3001:3000"
      - "5001:5001"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/logs:/app/backend/logs
    deploy:
      resources:
        limits:
          memory: 8G
    depends_on:
      zep:
        condition: service_started
    networks:
      - common_net

  zep:
    image: ghcr.io/getzep/zep:latest
    container_name: zep-server
    ports:
      - "8000:8000"
    volumes:
      - ./config-zep.yaml:/app/config.yaml
    environment:
      - ZEP_OPENAI_API_KEY=local_dummy_not_used
    command: ["--config", "/app/config.yaml"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - common_net

  db:
    image: pgvector/pgvector:pg15
    container_name: zep-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=zep
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - zep_db_data:/var/lib/postgresql/data
    networks:
      - common_net

networks:
  common_net:

volumes:
  zep_db_data:
