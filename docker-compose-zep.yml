version: '3.8'

services:
  zep:
    image: getzep/zep:latest
    container_name: zep-server
    ports:
      - "8000:8000"
    volumes:
      - ./config-zep.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: zep-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=zep
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - zep_db_data:/var/lib/postgresql/data

volumes:
  zep_db_data:
